<svg width="400" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a7ab8" />
      <stop offset="100%" stop-color="#7eb1e2" />
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="url(#skyGradient)" />
  
  <!-- Lake Ontario -->
  <rect y="150" width="400" height="50" fill="#3a75c4" />
  
  <!-- CN Tower -->
  <rect x="150" y="40" width="10" height="110" fill="#676767" />
  <ellipse cx="155" cy="40" rx="25" ry="10" fill="#676767" />
  <ellipse cx="155" cy="65" rx="15" ry="7" fill="#676767" />
  <rect x="152" y="20" width="6" height="20" fill="#676767" />
  
  <!-- Rogers Centre (Skydome) -->
  <ellipse cx="110" cy="130" rx="30" ry="15" fill="#e0e0e0" />
  <path d="M 80 130 Q 110 100 140 130" fill="#e0e0e0" />
  
  <!-- Skyline -->
  <rect x="30" y="90" width="15" height="60" fill="#d3d3d3" />
  <rect x="45" y="70" width="20" height="80" fill="#bebebe" />
  <rect x="65" y="100" width="15" height="50" fill="#d3d3d3" />
  <rect x="180" y="80" width="25" height="70" fill="#bebebe" />
  <rect x="205" y="95" width="20" height="55" fill="#d3d3d3" />
  <rect x="225" y="70" width="15" height="80" fill="#bebebe" />
  <rect x="240" y="85" width="20" height="65" fill="#d3d3d3" />
  <rect x="260" y="60" width="15" height="90" fill="#bebebe" />
  <rect x="275" y="75" width="30" height="75" fill="#d3d3d3" />
  <rect x="305" y="90" width="15" height="60" fill="#bebebe" />
  <rect x="320" y="80" width="25" height="70" fill="#d3d3d3" />
  <rect x="345" y="100" width="20" height="50" fill="#bebebe" />
  <rect x="365" y="85" width="15" height="65" fill="#d3d3d3" />
  
  <!-- Windows -->
  <rect x="33" y="95" width="3" height="5" fill="#ffffff" opacity="0.6" />
  <rect x="39" y="95" width="3" height="5" fill="#ffffff" opacity="0.6" />
  <rect x="33" y="105" width="3" height="5" fill="#ffffff" opacity="0.6" />
  <rect x="39" y="105" width="3" height="5" fill="#ffffff" opacity="0.6" />
  
  <rect x="48" y="75" width="4" height="6" fill="#ffffff" opacity="0.6" />
  <rect x="58" y="75" width="4" height="6" fill="#ffffff" opacity="0.6" />
  <rect x="48" y="85" width="4" height="6" fill="#ffffff" opacity="0.6" />
  <rect x="58" y="85" width="4" height="6" fill="#ffffff" opacity="0.6" />
  
  <!-- Toronto Islands -->
  <ellipse cx="160" cy="165" rx="40" ry="10" fill="#4f7942" />
  <ellipse cx="230" cy="170" rx="35" ry="8" fill="#4f7942" />
  <ellipse cx="90" cy="172" rx="30" ry="7" fill="#4f7942" />
  
  <!-- Small Boats -->
  <polygon points="110,155 105,160 115,160" fill="#ffffff" />
  <polygon points="200,160 195,165 205,165" fill="#ffffff" />
  <polygon points="300,157 295,162 305,162" fill="#ffffff" />
  
  <!-- Title -->
  <text x="200" y="190" font-family="Arial" font-size="16" fill="white" text-anchor="middle">Toronto, Canada</text>
</svg>