<svg width="400" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#62a0d5" />
      <stop offset="100%" stop-color="#c4dff6" />
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="url(#skyGradient)" />
  
  <!-- River Thames -->
  <path d="M 0 140 C 50 130 100 150 150 140 C 200 130 250 150 300 140 C 350 130 400 140 400 140 L 400 200 L 0 200 Z" fill="#426d8c" />
  
  <!-- Big Ben -->
  <rect x="150" y="60" width="20" height="80" fill="#e8d8b5" />
  <polygon points="150,60 170,60 160,40" fill="#ad9362" />
  <rect x="158" y="35" width="4" height="5" fill="#ad9362" />
  <rect x="152" y="70" width="16" height="16" fill="#3a5f8a" stroke="#ad9362" stroke-width="2" />
  
  <!-- Tower Bridge -->
  <rect x="240" y="90" width="10" height="50" fill="#e8d8b5" />
  <rect x="330" y="90" width="10" height="50" fill="#e8d8b5" />
  <path d="M 250 100 L 330 100" stroke="#848484" stroke-width="5" />
  <path d="M 250 110 L 330 110" stroke="#848484" stroke-width="5" />
  <path d="M 250 90 C 270 60 310 60 330 90" stroke="#848484" stroke-width="5" fill="none" />
  
  <!-- London Eye -->
  <circle cx="80" cy="100" r="30" fill="none" stroke="#c4c4c4" stroke-width="2" />
  <circle cx="80" cy="100" r="25" fill="none" stroke="#c4c4c4" stroke-width="2" />
  <circle cx="80" cy="70" r="3" fill="#c4c4c4" />
  <circle cx="80" cy="130" r="3" fill="#c4c4c4" />
  <circle cx="50" cy="100" r="3" fill="#c4c4c4" />
  <circle cx="110" cy="100" r="3" fill="#c4c4c4" />
  <circle cx="65" cy="80" r="3" fill="#c4c4c4" />
  <circle cx="95" cy="80" r="3" fill="#c4c4c4" />
  <circle cx="65" cy="120" r="3" fill="#c4c4c4" />
  <circle cx="95" cy="120" r="3" fill="#c4c4c4" />
  <rect x="75" y="130" width="10" height="10" fill="#a0a0a0" />
  
  <!-- Buildings -->
  <rect x="20" y="100" width="15" height="40" fill="#d9d9d9" />
  <rect x="35" y="90" width="10" height="50" fill="#c4c4c4" />
  <rect x="180" y="90" width="20" height="50" fill="#d9d9d9" />
  <rect x="200" y="80" width="15" height="60" fill="#c4c4c4" />
  <rect x="215" y="100" width="15" height="40" fill="#d9d9d9" />
  <rect x="350" y="80" width="25" height="60" fill="#c4c4c4" />
  <rect x="375" y="90" width="15" height="50" fill="#d9d9d9" />
  
  <!-- Clouds -->
  <ellipse cx="60" cy="40" rx="25" ry="15" fill="#ffffff" opacity="0.8" />
  <ellipse cx="290" cy="30" rx="30" ry="10" fill="#ffffff" opacity="0.7" />
  <ellipse cx="350" cy="50" rx="20" ry="12" fill="#ffffff" opacity="0.9" />
  
  <!-- Title -->
  <text x="200" y="190" font-family="Arial" font-size="16" fill="white" text-anchor="middle">London, United Kingdom</text>
</svg>